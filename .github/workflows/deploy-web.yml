# Deploy fizzyed.it: static landing (docs/) + browser app (zig-out/web → site/app/).
#
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions.
# Keep docs/CNAME (fizzyed.it) — it is copied into the published artifact.
#
# Build and deploy are separate jobs so re-running only "deploy" does not upload a second
# "github-pages" artifact (deploy-pages@v4 fails if multiple exist in one run).

name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "build.zig"
      - "build.zig.zon"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ZIG_VERSION: "0.16.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pre-create Zig global cache tmp/
        run: mkdir -p "$GITHUB_WORKSPACE/zig-global-cache/tmp"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          cache-key: ${{ hashFiles('build.zig.zon') }}

      - name: Fetch dependencies (with retries)
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/zig-global-cache
        run: |
          n=0
          until [ "$n" -ge 5 ]; do
            zig build --fetch && break
            n=$((n+1))
            echo "Fetch attempt $n failed, sleeping $((n*10))s before retry..."
            sleep $((n*10))
          done
          if [ "$n" -ge 5 ]; then
            echo "All fetch attempts failed"; exit 1
          fi

      - name: Build web app (ReleaseSafe)
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/zig-global-cache
        run: zig build web -Doptimize=ReleaseSafe

      - name: Assemble site
        run: |
          mkdir -p site/app
          cp -R docs/. site/
          cp -R zig-out/web/. site/app/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
